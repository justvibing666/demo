# Konfiguracja developerska – uruchamia tylko bazę danych
# Backend i frontend uruchamiane lokalnie (bez kontenerów)
#
# Użycie: docker compose -f docker-compose.dev.yml up -d

version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: demo-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: demo_db
      POSTGRES_USER: demo_user
      POSTGRES_PASSWORD: demo_pass
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo_user -d demo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:

networks:
  default:
    name: demo-network-dev
